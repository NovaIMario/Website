<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>storia</title>
   <style>
       body {
           background-image: url("https://time.graphics/uploadedFiles/500/98/bb/98bb7dfc21a368ed6d19ec02dbec4400.jpg"); 
           background-size: cover; /* Ensure the background covers the entire page */
       }
       .fixed-button {
           position: fixed;
           bottom: 20px;
           right: 20px;
           padding: 15px; 
           border-radius: 5px; 
           background-color: #007bff; /* Button color */
           color: white; /* Text color */
           border: none; /* Remove border */
           cursor: pointer; /* Change cursor to pointer */
       }
       .fixed-button:hover {
           background-color: #0056b3; /* Darker shade on hover */
       }
       .square-div {
           background-color: red;
           position: absolute;
           top: 20px;
           left: 20px;
           width: 200px; /* Set width */
           height: 200px;
           padding: 10px; /* Padding inside the div */
           color: white; /* Text color for better contrast */
       }
   </style>
</head>
<body>
   <div class="square-div">
       <h3>La strage della <br>notte di san <br>Bartolomeo</h3>
       <p>La triste storia dei scemi delle ideologie.</p>
   </div>
   <button class="fixed-button" onclick="window.location.href='https://www.example.com';">Avanti</button>
</body>
</html>
